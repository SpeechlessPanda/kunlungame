<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="photographic heritage backdrop">
  <defs>
    <linearGradient id="hall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2C1B10"/>
      <stop offset="60%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#07090F"/>
    </linearGradient>
    <linearGradient id="lantern" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#C55A48"/>
