    <rect x="396" y="300" width="8" height="70" fill="#3F9A6A"/>
    <circle cx="800" cy="380" r="72" fill="url(#lantern)"/>
    <rect x="796" y="250" width="8" height="80" fill="#3F9A6A"/>
    <circle cx="1200" cy="420" r="60" fill="url(#lantern)"/>
    <rect x="1196" y="300" width="8" height="70" fill="#3F9A6A"/>
  </g>
  <rect x="0" y="780" width="1600" height="120" fill="#0F172A" opacity="0.9"/>
  <rect x="0" y="780" width="1600" height="4" fill="#D97706" opacity="0.6"/>
