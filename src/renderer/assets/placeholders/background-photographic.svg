    <linearGradient id="pillar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C55A48" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2C1B10" stop-opacity="0.95"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#hall)"/>
  <rect x="120" y="260" width="90" height="520" fill="url(#pillar)"/>
